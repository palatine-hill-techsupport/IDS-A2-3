name: Update property data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 1 * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch and clean class dataset
        run: npm run data:fetch

      - name: Build static suburb centroid lookup
        run: npm run data:centroids

      - name: Build static dashboard
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # TODO: In repository Settings > Pages, set Source to "GitHub Actions" if it is not already enabled.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
